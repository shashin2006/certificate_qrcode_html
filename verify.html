<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Certificate Verification</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-50 to-gray-100 min-h-screen flex items-center justify-center">

  <div class="bg-white shadow-2xl rounded-2xl p-10 w-full max-w-2xl text-center">

    <h1 class="text-3xl font-bold mb-6 text-gray-800">
      Certificate Verification
    </h1>

    <div id="status" class="text-lg font-semibold mb-4">
      Checking certificate...
    </div>

    <div id="details" class="mt-6 space-y-3 text-left hidden">

      <div class="bg-gray-50 p-4 rounded-lg">
        <p class="text-sm text-gray-500">Name</p>
        <p id="name" class="text-lg font-medium text-gray-800"></p>
      </div>

      <div class="bg-gray-50 p-4 rounded-lg">
        <p class="text-sm text-gray-500">Certificate ID</p>
        <p id="certId" class="text-lg font-medium text-gray-800"></p>
      </div>

      <div class="bg-gray-50 p-4 rounded-lg">
        <p class="text-sm text-gray-500">Event</p>
        <p id="event" class="text-lg font-medium text-gray-800"></p>
      </div>

      <div class="bg-gray-50 p-4 rounded-lg">
        <p class="text-sm text-gray-500">Department</p>
        <p id="department" class="text-lg font-medium text-gray-800"></p>
      </div>

      <!-- Certificate Preview -->
      <div class="mt-6 text-center">
        <p class="text-md font-semibold mb-2">Certificate Preview</p>
        <img id="certificatePreview"
             class="rounded-xl shadow-lg cursor-pointer mx-auto w-full max-w-md border hover:scale-105 transition"
             src=""
             alt="Certificate Preview">
      </div>

      <!-- Download Button -->
      <div class="mt-6 text-center">
        <a id="downloadBtn"
           class="inline-block bg-blue-600 text-white px-6 py-3 rounded-lg shadow hover:bg-blue-700 transition"
           href="#"
           download>
          Download Certificate
        </a>
      </div>

    </div>

  </div>

  <!-- Modal -->
<!-- Modal -->
<div id="modal"
     class="fixed inset-0 bg-black bg-opacity-80 hidden items-center justify-center z-50">

  <div class="relative w-[95%] max-w-6xl">

    <!-- Close Button -->
    <button onclick="closeModal()"
            class="absolute -top-5 -right-5 bg-white text-black w-10 h-10 rounded-full shadow-lg text-2xl font-bold hover:bg-gray-200 transition">
      ×
    </button>

    <!-- Certificate Image -->
    <img id="modalImage"
         class="w-full rounded-lg shadow-2xl border-4 border-white">
  </div>
</div>

<script>

  const BACKEND_URL = "https://certificate-qrcode-backend-1.onrender.com";

  const params = new URLSearchParams(window.location.search);
  const certificateId = params.get('id');
  const token = params.get('token');

  fetch(`${BACKEND_URL}/verify/${certificateId}?token=${token}`)
    .then(res => res.json())
    .then(data => {

      const statusDiv = document.getElementById("status");
      const detailsDiv = document.getElementById("details");

      if (!data.valid) {
        statusDiv.innerHTML = "❌ Certificate Not Valid";
        statusDiv.className = "text-red-600 font-bold text-xl";
        detailsDiv.classList.add("hidden");
      } else {

        statusDiv.innerHTML = "✅ Certificate Verified";
        statusDiv.className = "text-green-600 font-bold text-xl";

        document.getElementById("name").innerText = data.name;
        document.getElementById("certId").innerText = data.certificateId;
        document.getElementById("event").innerText = data.event;
        document.getElementById("department").innerText = data.department;

        // Set preview image
        const imageUrl = `${BACKEND_URL}/certificate-image/${certificateId}`;
        document.getElementById("certificatePreview").src = imageUrl;
        document.getElementById("modalImage").src = imageUrl;

        // Set download link
        fetch(`${BACKEND_URL}/certificate-image/${certificateId}`)
          .then(res => res.json())
          .then(imgData => {
        
            const imageUrl = imgData.imageUrl;
        
            // Preview
            document.getElementById("certificatePreview").src = imageUrl;
            document.getElementById("modalImage").src = imageUrl;
        
            // Download (direct Cloudinary link)
            document.getElementById("downloadBtn").href = imageUrl;
          });

        detailsDiv.classList.remove("hidden");
      }
    })
    .catch(() => {
      document.getElementById("status").innerHTML = "⚠️ Server Error";
      document.getElementById("status").className = "text-yellow-600 font-bold text-xl";
    });

  // Modal logic
  document.getElementById("certificatePreview").onclick = function() {
    document.getElementById("modal").classList.remove("hidden");
    document.getElementById("modal").classList.add("flex");
  }

  function closeModal() {
    document.getElementById("modal").classList.add("hidden");
    document.getElementById("modal").classList.remove("flex");
  }

</script>

</body>
</html>
